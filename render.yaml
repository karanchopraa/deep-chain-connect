services:
  - type: static
    name: deep-chain-connect-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://deep-chain-connect-api.onrender.com/api

  - type: web
    name: deep-chain-connect-api
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install && npm run build && npx prisma generate"
    startCommand: "cd backend && npx prisma migrate deploy && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: deep-chain-connect-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: deep-chain-connect-db
    plan: free
